            <label>
              開始ページ
              <input id="start-page-input" type="number" min="0" value="0" />
            </label>
            <label>
              終了ページ
              <input id="end-page-input" type="number" min="0" value="0" />
            </label>
          </div>
          <label>
            今日残したいこと
            <textarea id="memo-input" rows="4" placeholder="心に残ったことを少しだけ"></textarea>
          </label>
          <button class="primary" type="submit">保存する</button>
        </form>
      </section>

      <section class="screen" id="memos-screen" data-title="本ごとの読書メモ">
        <div class="book-tabs" id="memo-book-tabs"></div>
        <div class="memo-list" id="memo-list"></div>
      </section>

      <section class="screen" id="graphs-screen" data-title="グラフ">
        <div class="range-tabs" id="range-tabs">
          <button class="active" type="button" data-range="7">7日</button>
          <button type="button" data-range="30">30日</button>
          <button type="button" data-range="365">1年</button>
        </div>
        <section class="chart-panel">
          <h2>読書時間推移</h2>
          <div class="bar-chart" id="minutes-chart"></div>
        </section>
        <section class="chart-panel">
          <h2>読んだページ数</h2>
          <div class="bar-chart monthly" id="pages-chart"></div>
        </section>
      </section>

      <section class="screen" id="settings-screen" data-title="設定">
        <form class="form-panel" id="settings-form">
          <fieldset>
            <legend>ゲート対象アプリ</legend>
            <label class="check"><input type="checkbox" name="gateApp" value="X" /> X</label>
            <label class="check"><input type="checkbox" name="gateApp" value="Instagram" /> Instagram</label>
            <label class="check"><input type="checkbox" name="gateApp" value="YouTube" /> YouTube</label>
          </fieldset>
          <div class="form-grid">
            <label>
              読書時間
              <input id="reading-minutes" type="number" min="1" max="120" />
            </label>
            <label>
              SNS時間
              <input id="sns-minutes" type="number" min="1" max="60" />
            </label>
          </div>
          <label>
            目次だけ見る
            <input id="short-minutes" type="number" min="1" max="30" />
          </label>
          <button class="primary" type="submit">設定を保存</button>
        </form>
        <section class="form-panel export-panel" aria-label="データ書き出し">
          <h2>データ</h2>
          <div class="export-actions">
            <button type="button" id="export-backup">データをバックアップ</button>
            <button type="button" id="import-backup">バックアップを読み込む</button>
            <button type="button" id="export-notion">Notion用CSVで書き出す</button>
            <button type="button" id="export-evernote">Evernote用Markdownで書き出す</button>
          </div>
          <input class="hidden" id="import-backup-file" type="file" accept="application/json,.json" />
          <div class="export-status" id="export-status" aria-live="polite"></div>
        </section>
      </section>

      <nav class="bottom-nav" aria-label="画面切り替え">
        <button class="active" type="button" data-nav="home">ホーム</button>
        <button type="button" data-nav="shelf">本棚</button>
        <button type="button" data-nav="timer">タイマー</button>
        <button type="button" data-nav="memos">メモ</button>
        <button type="button" data-nav="graphs">グラフ</button>
        <button type="button" data-nav="settings">設定</button>
      </nav>
    </main>

    <dialog id="gate-dialog">
      <div class="dialog-yokai">
        <div class="yokai small pulling mood-gate" aria-label="袖を引く黒い火の妖怪">
          <div class="yokai-flame"></div>
          <div class="yokai-face" aria-hidden="true">
            <span class="eye left"></span>
            <span class="eye right"></span>
            <span class="mouth"></span>
          </div>
          <div class="yokai-hands"></div>
          <div class="yokai-feet"></div>
          <div class="yokai-dust"></div>
        </div>
      </div>
      <h2>……読む？</h2>
      <p>この15分で読書できるよ</p>
      <div class="dialog-actions">
        <button class="primary" type="button" data-gate-action="read">📖 15分読む</button>
        <button type="button" data-gate-action="short">📚 目次だけ見る</button>
        <button type="button" data-gate-action="sns">📱 5分だけ見る</button>
      </div>
    </dialog>

    <dialog id="sns-dialog">
      <h2>SNS時間</h2>
      <div class="timer-time compact" id="sns-time">05:00</div>
      <p id="sns-message">終わったら、もう一度だけ聞くね。</p>
      <div class="dialog-actions hidden" id="sns-actions">
        <button class="primary" type="button" data-sns-action="read">読書する</button>
        <button type="button" data-sns-action="extend">SNS延長</button>
      </div>
    </dialog>

    <script src="game.js"></script>
  </body>
</html>
